        .iframe-container {

            position: relative;
            border: 3px solid #1e1b4b;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: white;
        }

        .iframe-wrapper::after {
            content: '↕ Arraste dentro da borda para rolar o formulário';
            display: block;
            text-align: center;
            font-size: 11px;
            color: #666;
            padding: 5px;
            background: #eee;
            border-top: 1px solid #ddd;
        }

        iframe {
            display: block;
            width: 100%;
            height: 85vh;
        }

        @media (max-width: 600px) {
            .iframe-container {
                padding: 10px 5px;
            }

        }
