<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Container dos botões de alternância */
        .tab-buttons {
            display: flex;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--bg-light);
        }

        .tab-btn {
            flex: 1;
            min-width: 160px;
            padding: 12px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: var(--border-radius);
            background-color: var(--white);
            color: var(--primary-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .tab-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background-color: var(--primary-color);
            color: var(--white);
        }

        .tab-btn.active {
            background: var(--gradient);
            color: var(--white);
            box-shadow: var(--shadow-lg);
        }

        /* ESTADO DESATIVADO (CARREGANDO) */
        .tab-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background-color: #f0f0f0;
            color: #888;
            box-shadow: none;
        }

        /* Container do iframe OCUPANDO TUDO */
        .iframe-container {
            padding: 0; /* Removido padding para encostar nas bordas */
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: var(--white);
        }

        .iframe-wrapper {
            position: relative;
            border: none;
            border-radius: 0; /* Removido arredondamento */
            overflow: hidden;
            flex: 1;
            display: none; /* Ativado via JS */
            flex-direction: column;
            width: 100%;
            min-height: 75vh;
            -webkit-overflow-scrolling: touch;
        }

        /* Instrução de rolagem opcional */
        .iframe-wrapper::after {
            content: '↕ Role dentro do formulário para ver mais';
            display: block;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 5px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
        }

        /* Ajuste para não ter scroll duplo no footer */
        footer {
            margin-top: auto;
            padding: 15px;
        }

        @media (max-width: 600px) {
            .tab-buttons {
                padding: 10px;
                gap: 8px;
            }

            .tab-btn {
                font-size: 0.85rem;
                padding: 10px;
                min-width: 140px;
            }

            .iframe-container {
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <div class="menu-overlay"></div>
    <aside class="side-menu">
        <a href="index.html"><i class="fas fa-home"></i> <span class="link-text">Início</span></a>
        <a href="estoque.html" class="active"><i class="fas fa-boxes-stacked"></i> <span class="link-text">Estoque</span></a>
        <a href="caixas.html"><i class="fas fa-box-open"></i> <span class="link-text">Caixas</span></a>
        <a href="camera.html"><i class="fas fa-camera"></i> <span class="link-text">Câmera</span></a>
        <a href="ponto-aux.html"><i class="fas fa-fingerprint"></i> <span class="link-text">Ponto - Auxiliar</span></a>
        <a href="materiais.html"><i class="fas fa-book"></i> <span class="link-text">Materiais</span></a>
        <a href="pedido.html"><i class="fas fa-file-invoice"></i> <span class="link-text">Sugestão de Pedido</span></a>
        <a href="solicitacoes.html"><i class="fas fa-clipboard-list"></i> <span class="link-text">Solicitações</span></a>

    <header id="cabecalho-principal">
        <button class="menu-toggle" aria-label="Abrir Menu">

        </button>
        <div class="logo-placeholder">
            <img src="./images/logo-qdelicia.png" alt="Logomarca Qdelícia Frutas" onerror="this.src='https://via.placeholder.com/150?text=QDelicia'">
        </div>
        <h1>Qdelícia Frutas</h1>
        <p id="subtitulo-header">Registro de estoque diário</p>

        <button onclick="recarregarPagina()" class="btn-refresh">

        </button>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="estoque.html" class="active">Estoque</a>
        <a href="caixas.html">Caixas</a>
        <a href="camera.html">Câmera</a>
        <a href="ponto-aux.html">Ponto - Auxiliar</a>
        <a href="materiais.html">Materiais</a>
        <a href="pedido.html">Sugestão</a>
        <a href="solicitacoes.html">Solicitações</a>
        <a href="#" class="logout-link-desktop" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>

    <div class="tab-buttons">
        <button class="tab-btn" id="btn-inicial" onclick="mostrarFormulario('inicial')">
            <i class="fas fa-exclamation-triangle"></i> Inicial/Devoluções
        </button>
        <button class="tab-btn" id="btn-final" onclick="mostrarFormulario('final')">
            <i class="fas fa-boxes-stacked"></i> Estoque Final
        </button>
    </div>

    <main class="iframe-container" id="container-estoque">
        <div class="iframe-wrapper" id="wrapper-estoque" style="display: flex;">
            <iframe id="iframe-inicial" src="https://script.google.com/macros/s/AKfycbz5kJZM32bjffIxZAt2z3v1wmsi-TvAlWYv1Rz-xxly-2YdwfBPhqE6NM4_zeSj6ryA/exec" frameborder="0" marginheight="0" marginwidth="0" style="display: none;">
                Carregando formulário...
            </iframe>
            
            <iframe id="iframe-final" src="https://script.google.com/macros/s/AKfycby6qt3ZbzcZr5_o_Pk-7gNC5DaLfCr8Xt2JbZe7e8gJMHQrwe8Ewk7lX_78JKlGx4as/exec" frameborder="0" marginheight="0" marginwidth="0" style="display: none;">

    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script src="alert.js"></script>
    <script>
        // --- NOVO CÓDIGO DE PRÉ-CARREGAMENTO E SPINNERS ---
        document.addEventListener('DOMContentLoaded', () => {
            const iframeInicial = document.getElementById('iframe-inicial');
            const iframeFinal = document.getElementById('iframe-final');
            const btnInic = document.getElementById('btn-inicial');
            const btnFinal = document.getElementById('btn-final');

            // Salva o conteúdo original dos botões
            const htmlOriginalInic = btnInic.innerHTML;
            const htmlOriginalFinal = btnFinal.innerHTML;

            // Desativa os botões e aplica o spinner
            btnInic.disabled = true;
            btnFinal.disabled = true;
            btnInic.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Carregando...';
            btnFinal.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Carregando...';

            // Libera o botão "Inicial" quando o iframe correspondente carregar
            iframeInicial.onload = () => {
                btnInic.disabled = false;
                btnInic.innerHTML = htmlOriginalInic;
            };

            // Libera o botão "Final" quando o iframe correspondente carregar
            iframeFinal.onload = () => {
                btnFinal.disabled = false;
                btnFinal.innerHTML = htmlOriginalFinal;
            };
        });
        // ---------------------------------------------------

        function mostrarFormulario(tipo) {
            const wrapper = document.getElementById('wrapper-estoque');
            const iframeInicial = document.getElementById('iframe-inicial');
            const iframeFinal = document.getElementById('iframe-final');
            const btnInic = document.getElementById('btn-inicial');
            const btnFinal = document.getElementById('btn-final');
            const subtitulo = document.getElementById('subtitulo-header');

            wrapper.style.display = 'flex';

            if (tipo === 'inicial') {
                iframeInicial.style.display = 'block';
                iframeFinal.style.display = 'none';
                
                btnInic.classList.add('active');
                btnFinal.classList.remove('active');
                subtitulo.textContent = 'Estoque Inicial e Devoluções';
            } else {
                iframeFinal.style.display = 'block';
                iframeInicial.style.display = 'none';
                
                btnFinal.classList.add('active');
                btnInic.classList.remove('active');
                subtitulo.textContent = 'Estoque Final';
            }
            
            // Scroll suave para o início do formulário no mobile
            window.scrollTo({
                top: document.getElementById('container-estoque').offsetTop - 20,
                behavior: 'smooth'
            });
        }
        
        function recarregarPagina() {
            location.reload();
        }
    </script>
</body>
