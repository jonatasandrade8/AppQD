<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <meta name="description" content="Registro de estoque diário - Qdelícia Frutas.">
    <title>Estoque - Qdelícia Frutas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-color: #f4f4f4;
        }

        /* Container dos botões de alternância */
        .tab-buttons {
            display: flex;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: #f4f4f4;
        }

        .tab-btn {
            flex: 1;
            min-width: 160px;
            padding: 12px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: #1e1b4b;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-btn.active {
            background: #1e1b4b;
            color: white;
        }

        /* Estado desativado para o carregamento */
        .tab-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        /* Implementação das características de caixas.html */
        .iframe-container {
            padding: 15px;
            background-color: #f4f4f4;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .iframe-wrapper {
            position: relative;
            border: 3px solid #1e1b4b; /* Idêntico ao caixas.html */
            border-radius: 15px; /* Idêntico ao caixas.html */
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: white;
            display: none; /* Ativado via JS */
            flex-direction: column;
        }

        /* Indicador visual de rolagem idêntico ao caixas.html */
        .iframe-wrapper::after {
            content: '↕ Arraste dentro da borda para rolar o formulário';
            display: block;
            text-align: center;
            font-size: 11px;
            color: #666;
            padding: 5px;
            background: #eee;
            border-top: 1px solid #ddd;
        }

        iframe {
            display: block;
            width: 100%;
            height: 85vh; /* Proporção do caixas.html */
            border: none;
        }

        /* Animação do Spinner */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fa-spin {
            animation: spin 1s infinite linear;
        }

        @media (max-width: 600px) {
            .iframe-container {
                padding: 10px 5px;
            }

            iframe {
                height: 75vh; /* Ajuste mobile do caixas.html */
            }

            .tab-btn {
                font-size: 0.85rem;
                padding: 10px;
                min-width: 140px;
            }
        }
    </style>
</head>

<body>

    <div class="menu-overlay"></div>
    <aside class="side-menu">
        <a href="index.html"><i class="fas fa-home"></i> <span class="link-text">Início</span></a>
        <a href="estoque.html" class="active"><i class="fas fa-boxes-stacked"></i> <span class="link-text">Estoque</span></a>
        <a href="caixas.html"><i class="fas fa-box-open"></i> <span class="link-text">Caixas</span></a>
        <a href="camera.html"><i class="fas fa-camera"></i> <span class="link-text">Câmera</span></a>
        <a href="ponto-aux.html"><i class="fas fa-fingerprint"></i> <span class="link-text">Ponto - Auxiliar</span></a>
        <a href="materiais.html"><i class="fas fa-book"></i> <span class="link-text">Materiais</span></a>
        <a href="pedido.html"><i class="fas fa-file-invoice"></i> <span class="link-text">Sugestão de Pedido</span></a>
        <a href="solicitacoes.html"><i class="fas fa-clipboard-list"></i> <span class="link-text">Solicitações</span></a>
        <a href="#" class="logout-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span class="link-text">Sair</span></a>
    </aside>

    <header id="cabecalho-principal">
        <button class="menu-toggle" aria-label="Abrir Menu">
            <i class="fas fa-bars"></i>
            <span class="menu-label">Menu</span>
        </button>
        <div class="logo-placeholder">
            <img src="./images/logo-qdelicia.png" alt="Logomarca Qdelícia Frutas" onerror="this.src='https://via.placeholder.com/150?text=QDelicia'">
        </div>
        <h1>Qdelícia Frutas</h1>
        <p id="subtitulo-header">Registro de estoque diário</p>

        <button onclick="recarregarPagina()" class="btn-refresh">
            <i class="fas fa-sync-alt"></i> Atualizar
        </button>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="estoque.html" class="active">Estoque</a>
        <a href="caixas.html">Caixas</a>
        <a href="camera.html">Câmera</a>
        <a href="ponto-aux.html">Ponto - Auxiliar</a>
        <a href="materiais.html">Materiais</a>
        <a href="pedido.html">Sugestão</a>
        <a href="solicitacoes.html">Solicitações</a>
        <a href="#" class="logout-link-desktop" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </nav>

    <div class="tab-buttons">
        <button class="tab-btn" id="btn-inicial" onclick="mostrarFormulario('inicial')">
            <i class="fas fa-exclamation-triangle"></i> <span>Inicial/Devoluções</span>
        </button>
        <button class="tab-btn" id="btn-final" onclick="mostrarFormulario('final')">
            <i class="fas fa-boxes-stacked"></i> <span>Estoque Final</span>
        </button>
    </div>

    <main class="iframe-container" id="container-estoque">
        <div class="iframe-wrapper" id="wrapper-estoque">
            <iframe id="iframe-estoque" src="" frameborder="0" marginheight="0" marginwidth="0">
                Carregando formulário...
            </iframe>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Qdelícia Frutas. Todos os direitos reservados.</p>
    </footer>

    <a href="https://wa.me/5581997250086" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <div class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script src="alert.js"></script>
    <script>
        const URLS = {
            inicial: 'https://script.google.com/macros/s/AKfycbx_dcMiFUawWThCC6u126b9t2Ptzfy68paXRz3ODQ85SH8ShctDpjWWxrt3JBhDMfUn/exec',
            final: 'https://script.google.com/macros/s/AKfycby6qt3ZbzcZr5_o_Pk-7gNC5DaLfCr8Xt2JbZe7e8gJMHQrwe8Ewk7lX_78JKlGx4as/exec'
        };

        function mostrarFormulario(tipo) {
            const iframe = document.getElementById('iframe-estoque');
            const wrapper = document.getElementById('wrapper-estoque');
            const btnInic = document.getElementById('btn-inicial');
            const btnFinal = document.getElementById('btn-final');
            const subtitulo = document.getElementById('subtitulo-header');
            
            // Identifica qual botão foi clicado e seu ícone
            const btnAtivo = tipo === 'inicial' ? btnInic : btnFinal;
            const icon = btnAtivo.querySelector('i');
            const originalClass = tipo === 'inicial' ? 'fas fa-exclamation-triangle' : 'fas fa-boxes-stacked';

            // 1. Bloqueia interação e inicia Spinner
            btnInic.disabled = true;
            btnFinal.disabled = true;
            icon.className = "fas fa-spinner fa-spin"; 

            // 2. Exibe o container (mesmo que ainda esteja carregando o src)
            wrapper.style.display = 'flex';
            
            // 3. Define o que acontece quando o carregamento termina
            iframe.onload = function() {
                icon.className = originalClass; // Restaura ícone original
                btnInic.disabled = false;
                btnFinal.disabled = false;
                
                // Limpa o evento para evitar execuções duplicadas
                iframe.onload = null;
            };

            // 4. Dispara o carregamento do SRC
            if (iframe.src !== URLS[tipo]) {
                iframe.src = URLS[tipo];
            } else {
                // Se já for o mesmo link, apenas simula o fim do loading
                setTimeout(() => { iframe.onload(); }, 500);
            }

            // 5. Estilo visual dos botões (Active)
            if (tipo === 'inicial') {
                btnInic.classList.add('active');
                btnFinal.classList.remove('active');
                subtitulo.textContent = 'Estoque Inicial e Devoluções';
            } else {
                btnFinal.classList.add('active');
                btnInic.classList.remove('active');
                subtitulo.textContent = 'Estoque Final';
            }
            
            // Scroll suave para o formulário
            window.scrollTo({
                top: document.getElementById('container-estoque').offsetTop - 20,
                behavior: 'smooth'
            });
        }
        
        function recarregarPagina() {
            location.reload();
        }
    </script>
</body>
</html>
