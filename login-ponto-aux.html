<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ponto Auxiliar - Qdelícia Frutas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            width: 120px;
            margin-bottom: 20px;
        }

        .login-title {
            font-family: 'Lexend', sans-serif;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .error-message {
            color: var(--danger-color);
            background: #fef2f2;
            padding: 10px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <img src="./images/logo-qdelicia.png" alt="Qdelícia Frutas" class="login-logo">
        <h2 class="login-title">Acesso ao Ponto Auxiliar</h2>

        <div id="error-message" class="error-message">Usuário ou senha incorretos.</div>

        <form id="login-form">
            <div class="input-group">
                <label for="username">Usuário (Primeiro Nome)</label>
                <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required
                    autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">Entrar</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Início</a>
    </div>

    <!-- Importa as configurações do sistema para ter acesso a APP_CONFIG.users -->
    <script src="config.js"></script>
    <script src="login-ponto-aux.js"></script>
</body>

</html>
